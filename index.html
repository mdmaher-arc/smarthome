<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Home</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="lockScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#222;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-family:sans-serif;">
  <h2 style="margin-bottom:20px;">&#128274; Security verification</h2>
  <input type="text" id="lUser" placeholder="Username" style="margin-bottom:10px;padding:12px;border-radius:5px;border:none;width:80%;max-width:300px;font-size:16px;">
  <input type="password" id="lPass" placeholder="Password" style="margin-bottom:20px;padding:12px;border-radius:5px;border:none;width:80%;max-width:300px;font-size:16px;">
  <button onclick="checkLock()" style="padding:12px 24px;border-radius:5px;border:none;background:#2196f3;color:white;font-weight:bold;cursor:pointer;font-size:16px;">Login</button>
  <div id="lErr" style="color:#ff5252;margin-top:15px;display:none;font-weight:bold;">Invalid username or password</div>
</div>
<script>
  if (localStorage.getItem('sh_auth') === 'Lovely Home:Nothing2.0') {
    document.getElementById('lockScreen').style.display = 'none';
  }
  function checkLock() {
    let u = document.getElementById('lUser').value.trim();
    let p = document.getElementById('lPass').value.trim();
    if (u === 'Lovely Home' && p === 'Nothing2.0') {
      localStorage.setItem('sh_auth', u + ':' + p);
      document.getElementById('lockScreen').style.display = 'none';
    } else {
      document.getElementById('lErr').style.display = 'block';
    }
  }
</script>
<header>
  <h1>&#127968; Smart Home</h1>
  <div id="status" class="err">&#9679; Connecting&hellip;</div>
</header>
<div class="tabs">
  <button class="tab on" onclick="show('front',this)">&#128186; Front Room</button>
  <button class="tab" onclick="show('bed',this)">&#128716; Bed Room</button>
  <button class="tab" onclick="show('read',this)">&#128218; Reading Room</button>
  <button class="tab" onclick="show('garden',this)">&#127807; Garden</button>
</div>
<div class="panel on" id="tab-front">
  <div class="card"><h2>Front Room &mdash; Relays 1&ndash;5</h2><div class="grid" id="gFront"></div></div>
  <div class="card">
    <h2>Light Sensor (LDR)</h2>
    <div id="ldrBdg" class="bdg bdg-x">LDR Loading&hellip;</div>
    <div class="bar-wrap"><div id="ldrBar" class="bar"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#666">
      <span>Raw: <b id="ldrRaw">--</b></span><span><b id="ldrPct">--%</b></span>
    </div>
    <small style="color:#888">Threshold: <b id="ldrThrDisp">50%</b></small>
  </div>
</div>
<div class="panel" id="tab-bed">
  <div class="card"><h2>Bed Room &mdash; Relays 6&ndash;10</h2><div class="grid" id="gBed"></div></div>
</div>
<div class="panel" id="tab-read">
  <div class="card"><h2>Reading Room &mdash; Relays 1&ndash;4</h2><div class="grid" id="gRead"></div></div>
</div>
<div class="panel" id="tab-garden">
  <div class="card">
    <h2>Garden Valve</h2>
    <div id="valveSt" class="valve closed">Valve: CLOSED</div>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button class="btn btn-g" onclick="valveCmd('open')">&#128167; Open / Water</button>
      <button class="btn btn-r" onclick="valveCmd('close')">&#128274; Close / Drain</button>
    </div>
  </div>
  <div class="card">
    <h2>Watering Schedules</h2>
    <div id="schedCont"></div>
    <div class="srow"><button class="btn btn-b" onclick="saveSchedules()">Save Schedules</button><span class="smsg" id="smsgSched">Saved!</span></div>
  </div>
<script src="mqtt.min.js"></script>
<script src="app.js"></script>
</body></html>
